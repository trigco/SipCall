name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Release APKs
        run: ./gradlew assembleRelease

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v-manual" >> $GITHUB_OUTPUT
          fi

      - name: Prepare APKs
        run: |
          mkdir -p release_artifacts
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk release_artifacts/IPDial-${{ steps.get_version.outputs.VERSION }}-arm64-v8a.apk
          cp app/build/outputs/apk/release/app-armeabi-v7a-release.apk release_artifacts/IPDial-${{ steps.get_version.outputs.VERSION }}-armeabi-v7a.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "IPDial Release ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🚀 IPDial ${{ steps.get_version.outputs.VERSION }}
            
            This is the production release of IPDial.
            
            ### ✨ Features
            - Modern VoIP interface
            - HD Audio support
            - Multi-account SIP support with auto-transport selection
            - Advanced Echo Cancellation and Noise Suppression
            
            ### 📦 Installation
            1. Download the APK corresponding to your device's architecture:
               - **arm64-v8a**: For modern 64-bit phones (recommended)
               - **armeabi-v7a**: For older 32-bit phones
            2. Open the file on your Android device.
            3. If prompted, allow "Install from unknown sources".
          files: release_artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


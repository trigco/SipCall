name: Build & Release APK

on:
  push:
    tags:
      - 'v*'   # triggers on tags like v1.1, v1.2, etc.
  workflow_dispatch: # Allows manual trigger from GitHub Actions tab

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v-manual" >> $GITHUB_OUTPUT
          fi

      - name: Prepare APKs
        run: |
          mkdir -p release_artifacts
          # Find and copy the universal APK
          find app/build/outputs/apk/debug/ -name "*universal-debug.apk" -exec cp {} release_artifacts/IPDial-${{ steps.get_version.outputs.VERSION }}-universal.apk \;
          # Find and copy ABI specific APKs
          find app/build/outputs/apk/debug/ -name "*-arm64-v8a-debug.apk" -exec cp {} release_artifacts/IPDial-${{ steps.get_version.outputs.VERSION }}-arm64.apk \;
          find app/build/outputs/apk/debug/ -name "*-armeabi-v7a-debug.apk" -exec cp {} release_artifacts/IPDial-${{ steps.get_version.outputs.VERSION }}-armv7.apk \;

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "IPDial ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🚀 IPDial ${{ steps.get_version.outputs.VERSION }}
            
            ### What's New
            - See the commit history for a list of changes.
            
            ### 📦 Installation
            1. Download the **universal.apk** below for most devices.
            2. Open the file on your Android device.
            3. If prompted, allow "Install from unknown sources".
          files: release_artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

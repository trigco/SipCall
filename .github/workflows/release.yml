name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Create dummy google-services.json if missing
        run: |
          if [ ! -f app/google-services.json ]; then
            echo '{
              "project_info": {
                "project_number": "000000000000",
                "project_id": "dummy-id"
              },
              "client": [
                {
                  "client_info": {
                    "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                    "android_client_info": {
                      "package_name": "com.ipdial"
                    }
                  },
                  "api_key": [
                    {
                      "current_key": "dummy-key"
                    }
                  ],
                  "services": {
                    "appinvite_service": {
                      "other_platform_oauth_client": []
                    }
                  }
                }
              ],
              "configuration_version": "1"
            }' > app/google-services.json
          fi

      - name: Build Release APKs
        run: ./gradlew assembleRelease

      - name: Get version
        id: get_version
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          else
            echo "VERSION=v-manual" >> $GITHUB_OUTPUT
          fi

      - name: Prepare APKs
        run: |
          mkdir -p release_artifacts
          cp app/build/outputs/apk/release/app-arm64-v8a-release.apk release_artifacts/IPDial-${{ steps.get_version.outputs.VERSION }}-arm64-v8a.apk
          cp app/build/outputs/apk/release/app-armeabi-v7a-release.apk release_artifacts/IPDial-${{ steps.get_version.outputs.VERSION }}-armeabi-v7a.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "IPDial Release ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## 🚀 IPDial ${{ steps.get_version.outputs.VERSION }}
            
            This is the first stable production release of IPDial!
            
            ### ✨ Features
            - **Multi-Account SIP**: Add and manage multiple SIP profiles easily.
            - **HD Audio**: Built-in Echo Cancellation, Noise Suppression, and AGC.
            - **Calling Cards**: Immersive fullscreen contact photos during active calls.
            - **Dark Mode**: Fully adaptive dark/light mode UI with Material You design.
            - **Native Integration**: Incoming calls ring even when the phone is asleep or locked, just like a regular phone call.
            - **Call Recording & Logging**: Keep track of and record your SIP conversations.
            
            ### 📦 Installation
            1. Download the APK corresponding to your device's architecture:
               - **arm64-v8a**: For modern 64-bit phones (recommended for most users)
               - **armeabi-v7a**: For older 32-bit phones
            2. Open the file on your Android device.
            3. If prompted, allow "Install from unknown sources" or "Install from this source".
            
            > **⚠️ Note on Google Play Protect:**
            > Because this app is sideloaded and not yet published on the Play Store, Google Play Protect may show a warning ("Unsafe app blocked").
            > To install, tap **More details** and then select **Install anyway**.
          files: release_artifacts/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


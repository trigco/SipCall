name: Build & Release APK

on:
  push:
    tags:
      - 'v*'   # triggers on tags like v1.1, v1.2.0, etc.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug

      - name: Get version from tag
        id: get_version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/arm64-v8a/debug/app-arm64-v8a-debug.apk \
             IPDial-${{ steps.get_version.outputs.VERSION }}-arm64.apk || \
          mv app/build/outputs/apk/debug/app-debug.apk \
             IPDial-${{ steps.get_version.outputs.VERSION }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.get_version.outputs.VERSION }}
          name: "IPDial ${{ steps.get_version.outputs.VERSION }}"
          body: |
            ## What's New
            See commit history for changes in this release.
            
            ## Installation
            Download the APK below and install on your Android device.
            Enable "Install from unknown sources" if prompted.
          files: |
            IPDial-*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

name: Build and Release APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Decode keystore from secrets
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
        run: |
          echo "${KEYSTORE_BASE64}" | base64 -d - > ipdial.jks

      - name: Create keystore.properties from secrets
        env:
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          echo "STORE_FILE=ipdial.jks" > keystore.properties
          echo "STORE_PASSWORD=${STORE_PASSWORD}" >> keystore.properties
          echo "KEY_ALIAS=${KEY_ALIAS}" >> keystore.properties
          echo "KEY_PASSWORD=${KEY_PASSWORD}" >> keystore.properties

      - name: Build signed release APK
        run: ./gradlew assembleRelease

      - name: Rename APKs with ABI and version
        run: |
          VERSION=$(grep versionName app/build.gradle | sed 's/.*"\(.*\)".*/\1/')
          for apk in app/build/outputs/apk/release/*.apk; do
            abi=$(echo "$apk" | sed 's/.*-\(.*\)-release\.apk/\1/')
            mv "$apk" "app/build/outputs/apk/release/IPDial-${abi}-v${VERSION}.apk"
          done

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: IPDial-APKs
          path: app/build/outputs/apk/release/IPDial-*.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/IPDial-*.apk
          generate_release_notes: true
